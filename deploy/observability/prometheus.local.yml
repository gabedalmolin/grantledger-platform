global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: grantledger-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:3000

  - job_name: grantledger-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:9464
