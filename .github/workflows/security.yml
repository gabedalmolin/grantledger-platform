name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'pull_request' }}

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production dependency audit
        run: npm audit --omit=dev --audit-level=high

  container-scan:
    name: Container Scan (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            dockerfile: apps/api/Dockerfile
            image: grantledger-api:security
            sarif: trivy-api.sarif
          - target: worker
            dockerfile: apps/worker/Dockerfile
            image: grantledger-worker:security
            sarif: trivy-worker.sarif

    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.image }} .

      - name: Prepare Trivy cache directory
        run: mkdir -p "$RUNNER_TEMP/trivy-cache-${{ matrix.target }}"

      - name: Scan image for high and critical vulnerabilities
        run: >
          docker run --rm
          -e TRIVY_CACHE_DIR=/tmp/trivy-cache
          -e XDG_CACHE_HOME=/tmp/trivy-cache
          -v /var/run/docker.sock:/var/run/docker.sock
          -v "$PWD:/workspace"
          -v "$RUNNER_TEMP/trivy-cache-${{ matrix.target }}:/tmp/trivy-cache"
          aquasec/trivy:0.56.1 image
          --format sarif
          --output "/workspace/${{ matrix.sarif }}"
          --severity HIGH,CRITICAL
          --pkg-types os,library
          --ignore-unfixed
          --exit-code 0
          "${{ matrix.image }}"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ matrix.sarif }}
          category: trivy-${{ matrix.target }}

  sbom:
    name: SBOM (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api
            dockerfile: apps/api/Dockerfile
            image: grantledger-api:security
            artifact: sbom-api.spdx.json
          - target: worker
            dockerfile: apps/worker/Dockerfile
            image: grantledger-worker:security
            artifact: sbom-worker.spdx.json

    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -f ${{ matrix.dockerfile }} -t ${{ matrix.image }} .

      - name: Prepare Trivy cache directory
        run: mkdir -p "$RUNNER_TEMP/trivy-cache-${{ matrix.target }}"

      - name: Generate image SBOM
        run: >
          docker run --rm
          -e TRIVY_CACHE_DIR=/tmp/trivy-cache
          -e XDG_CACHE_HOME=/tmp/trivy-cache
          -v /var/run/docker.sock:/var/run/docker.sock
          -v "$PWD:/workspace"
          -v "$RUNNER_TEMP/trivy-cache-${{ matrix.target }}:/tmp/trivy-cache"
          aquasec/trivy:0.56.1 image
          --format spdx-json
          --output "/workspace/${{ matrix.artifact }}"
          --exit-code 0
          "${{ matrix.image }}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
